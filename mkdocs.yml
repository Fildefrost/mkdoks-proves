site_name: CiberBlog
site_url: https://github.com/Fildefrost

theme:
  name: material
  logo: assets/fs.png
  features:
    - navigation.tabs
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
  palette:
    - scheme: slate
      primary: black
      accent: blue
    - scheme: default
      primary: black
      accent: lime
      toggle:
        icon: material/weather-night
        name: Modo oscuro
  

plugins:
  - search
nav:
  - Inicio: index.md
  - Writeup-ctfs:
