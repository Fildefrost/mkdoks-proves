extra:
  social:
    - icon: fontawesome/brands/github-alt
      link: https://github.com/fildefrost
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/jordi-ciber/

extra_css:
  - assets/css/extra.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg

